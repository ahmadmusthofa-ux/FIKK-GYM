<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Member - FIKK Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent; /* Menghapus highlight biru saat tap di mobile */
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* Latar belakang foto gym dengan overlay gelap */
            background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(30, 27, 75, 0.85)), 
                        url('https://i.ibb.co.com/LzWKbhYC/Whats-App-Image-2026-04-30-at-08-51-30.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .card {
            width: 100%;
            max-width: 420px;
            /* Efek Transparan Glassmorphism yang dioptimalkan untuk mobile */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            width: 85px;
            height: 85px;
            margin: 0 auto 20px;
            background: #fff;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            padding: 12px;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h2 {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #fff;
            font-size: 13px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            outline: none;
            border-radius: 15px;
            font-size: 16px; /* Font minimal 16px mencegah auto-zoom di iOS */
            background: rgba(255, 255, 255, 0.95);
            color: #0f172a;
            transition: transform 0.2s;
        }

        input:focus {
            background: #fff;
            border-color: #4f46e5;
        }

        .password-wrap {
            position: relative;
        }

        .eye {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            font-size: 18px;
            padding: 5px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 14px;
            color: #fff;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.4);
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: #fff;
            color: #1e1b4b;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        button:active {
            transform: scale(0.98);
            background: #f1f5f9;
        }

        #loading {
            display: none;
            margin-top: 20px;
            text-align: center;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 13px;
        }

        @media(max-width: 375px) {
            .card { padding: 25px 20px; }
            h2 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="https://i.ibb.co.com/WNQ2tjLc/dd99ebcb-3875-4e56-bfd2-4ac6a776c6e4-removebg-preview.png" alt="Logo FIKK UNESA">
    </div>

    <h2>Login Member</h2>
    <p class="subtitle">Akses Dashboard Member FIKK</p>

    <div class="input-group">
        <label for="email">Email</label>
        <input id="email" type="email" inputmode="email" placeholder="nama@email.com" autocomplete="email">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <div class="password-wrap">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>
    </div>

    <div class="row">
        <label class="remember">
            <input type="checkbox" id="rememberMe">
            Ingat Saya
        </label>
        <a href="javascript:void(0)" onclick="forgotPassword()" class="forgot">Reset pasword?</a>
    </div>

    <button onclick="login()">MASUK SEKARANG</button>

    <div id="loading">Memproses data...</div>

    <a href="index.html" class="back">← Kembali ke Beranda</a>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwZSF76UahkADiQkOFAnW2Yl3GZ4ENG1wtQgA3jfskU2nTwdXdSS0XKpSf3-aeOFM53/exec";

    window.onload = function() {
        let saved = localStorage.getItem('savedEmail');
        if(saved) {
            document.getElementById('email').value = saved;
            document.getElementById('rememberMe').checked = true;
        }
    }

    function togglePassword() {
        let p = document.getElementById('password');
        p.type = (p.type === 'password') ? 'text' : 'password';
    }

    async function forgotPassword() {
        const { value: email } = await Swal.fire({
            title: 'Lupa Password',
            input: 'email',
            inputLabel: 'Masukkan email terdaftar',
            inputPlaceholder: 'email@fikk.com',
            confirmButtonText: 'Kirim Instruksi',
            confirmButtonColor: '#4f46e5',
            showCancelButton: true
        });

        if (email) {
            Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                let r = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'forgotPassword', email: email.trim().toLowerCase() })
                });
                let j = await r.json();
                Swal.fire({ icon: j.status ? 'success' : 'error', title: j.status ? 'Berhasil' : 'Gagal', text: j.message });
            } catch(e) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Koneksi gagal' });
            }
        }
    }

    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const rememberMe = document.getElementById('rememberMe').checked;

        if(!email || !password) {
            Swal.fire({ icon: 'warning', title: 'Data Kosong', text: 'Email dan password wajib diisi' });
            return;
        }

        if(rememberMe) localStorage.setItem('savedEmail', email);
        else localStorage.removeItem('savedEmail');

        document.getElementById('loading').style.display = 'block';

        try {
            let r = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'login',
                    email: email.toLowerCase(),
                    password: password
                })
            });

            let j = await r.json();
            document.getElementById('loading').style.display = 'none';

            if(j.status) {
                localStorage.setItem('memberId', j.memberId);
                Swal.fire({
                    icon: 'success',
                    title: 'Berhasil',
                    text: 'Selamat datang kembali!',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    window.location = 'dashboard-member.html';
                });
            } else {
                Swal.fire({ icon: 'error', title: 'Gagal', text: j.message || 'Email atau password salah' });
            }
        } catch(err) {
            document.getElementById('loading').style.display = 'none';
            Swal.fire({ icon: 'error', title: 'Server Error', text: 'Gagal menghubungi server' });
        }
    }
</script>
</body>
</html>
